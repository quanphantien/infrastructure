apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-ingress"
  annotations:
    # Tells Kubernetes to use the Nginx Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # Essential for FastAPI: strips the "/api" prefix before forwarding the request
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - host: "app.quanphantien.com" # Replace with your actual domain
    http:
      paths:
      # 1. Route for the Backend API
      - path: /api/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: "{{ .Release.Name }}-backend-service"
            port:
              number: 80
      
      # 2. Route for the Frontend Web App
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: "{{ .Release.Name }}-frontend-service"
            port:
              number: 80